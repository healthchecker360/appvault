<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Categories — Browse by Type | AppVault</title>
  <meta name="description" content="Browse Android APK and Windows software by category. Social, Tools, Games, Music, Video, Education and more.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-logo"><div class="logo-icon">A</div>App<span>Vault</span></a>
    <div class="navbar-search"><span class="search-icon">&#128269;</span><input type="text" id="navSearch" placeholder="Search apps..."></div>
    <nav class="navbar-nav"><a href="index.html">Home</a><a href="android.html">Android</a><a href="windows.html">Windows</a><a href="categories.html" class="active">Categories</a><a href="trending.html">Trending</a></nav>
    <button class="navbar-menu-btn" id="menuBtn">&#9776;</button>
  </div>
  <div class="navbar-mobile" id="mobileMenu"><a href="index.html">Home</a><a href="android.html">Android</a><a href="windows.html">Windows</a><a href="categories.html">Categories</a></div>
</nav>

<div class="container"><div class="ad-slot ad-slot-leaderboard">Advertisement</div></div>

<div class="container" style="padding-top:32px;">
  <h1 style="font-size:32px;margin-bottom:8px;">Browse <span style="color:var(--accent2);">Categories</span></h1>
  <p style="color:var(--text2);margin-bottom:32px;">Find apps by type. All free, all safe.</p>

  <div id="categoryGrid" class="category-grid"></div>
</div>

<div class="container"><div class="ad-slot ad-slot-leaderboard" style="margin-top:32px;">Advertisement</div></div>

<!-- Category Apps Section -->
<div class="container" style="margin-top:40px;margin-bottom:48px;">
  <div id="categoryAppsSection" style="display:none;">
    <div class="section-header">
      <h2 class="section-title" id="categoryAppsTitle">Apps</h2>
      <button class="btn btn-secondary btn-sm" onclick="clearCategory()">&#8592; All Categories</button>
    </div>
    <div id="categoryApps" class="app-grid"></div>
  </div>
</div>

<footer class="footer"><div class="container"><div class="footer-bottom"><div class="footer-legal">&copy; <span id="footerYear"></span> AppVault. All logos belong to respective owners. We do not host copyrighted content.</div></div></div></footer>

<script src="sheets-loader.js"></script>
<script src="main.js"></script>
<script>
var CATEGORY_META = {
  "social":     { icon: "&#128172;", label: "Social Media" },
  "tools":      { icon: "&#128295;", label: "Tools & Utilities" },
  "games":      { icon: "&#127918;", label: "Games" },
  "video":      { icon: "&#127909;", label: "Video & Media" },
  "music":      { icon: "&#127911;", label: "Music & Audio" },
  "education":  { icon: "&#128218;", label: "Education" },
  "security":   { icon: "&#128737;", label: "Security & VPN" },
  "office":     { icon: "&#128196;", label: "Office & Productivity" },
  "shopping":   { icon: "&#128722;", label: "Shopping" },
  "travel":     { icon: "&#9992;",   label: "Travel & Maps" },
  "health":     { icon: "&#10084;",  label: "Health & Fitness" },
  "finance":    { icon: "&#128184;", label: "Finance" },
  "photography":{ icon: "&#128247;", label: "Photography" },
  "browser":    { icon: "&#127758;", label: "Browsers" },
  "media":      { icon: "&#127902;", label: "Media Players" }
};

async function loadCategories() {
  var apps = await window.AppVaultDB.getApps();
  var catCounts = {};
  apps.forEach(function(a) {
    if (a.category) {
      catCounts[a.category.toLowerCase()] = (catCounts[a.category.toLowerCase()] || 0) + 1;
    }
  });

  var cats = Object.keys(catCounts);
  if (cats.length === 0) {
    // Show default categories even if no apps yet
    cats = Object.keys(CATEGORY_META);
    cats.forEach(function(c) { catCounts[c] = 0; });
  }

  var html = cats.map(function(cat) {
    var meta = CATEGORY_META[cat] || { icon: "&#128230;", label: cat.charAt(0).toUpperCase() + cat.slice(1) };
    var count = catCounts[cat] || 0;
    return '<div class="category-card" onclick="loadCategoryApps(\'' + cat + '\',\'' + meta.label + '\')">'
      + '<div class="cat-icon">' + meta.icon + '</div>'
      + '<div class="cat-name">' + meta.label + '</div>'
      + '<div class="cat-count">' + count + ' app' + (count !== 1 ? "s" : "") + '</div>'
      + '</div>';
  }).join("");

  document.getElementById("categoryGrid").innerHTML = html;
}

async function loadCategoryApps(cat, label) {
  document.getElementById("categoryAppsSection").style.display = "block";
  document.getElementById("categoryAppsTitle").innerHTML = "&#128230; " + label + " <span style='color:var(--accent2)'>Apps</span>";
  showLoading("categoryApps");
  var apps = await window.AppVaultDB.getAppsByCategory(cat);
  if (apps.length === 0) { showEmpty("categoryApps", "No " + label + " apps yet"); }
  else { document.getElementById("categoryApps").innerHTML = apps.map(buildAppCard).join(""); }
  document.getElementById("categoryAppsSection").scrollIntoView({ behavior: "smooth" });
}

function clearCategory() {
  document.getElementById("categoryAppsSection").style.display = "none";
}

loadCategories();
</script>
</body>
</html>
