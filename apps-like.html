<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" id="pageDesc" content="Find the best free alternatives and similar apps on AppVault.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-logo"><div class="logo-icon">A</div>App<span>Vault</span></a>
    <div class="navbar-search"><span class="search-icon">&#128269;</span><input type="text" id="navSearch" placeholder="Search apps..."></div>
    <nav class="navbar-nav"><a href="index.html">Home</a><a href="android.html">Android</a><a href="windows.html">Windows</a><a href="categories.html">Categories</a></nav>
    <button class="navbar-menu-btn" id="menuBtn">&#9776;</button>
  </div>
  <div class="navbar-mobile" id="mobileMenu"><a href="index.html">Home</a><a href="android.html">Android</a><a href="windows.html">Windows</a></div>
</nav>

<div class="container"><div class="ad-slot ad-slot-leaderboard">Advertisement</div></div>

<div class="container apps-like-hero" id="heroSection"></div>

<div class="container"><div class="ad-slot ad-slot-leaderboard">Advertisement</div></div>

<div class="container" style="margin-bottom:48px;">
  <div id="similarApps" class="app-grid"></div>
</div>

<footer class="footer"><div class="container"><div class="footer-bottom"><div class="footer-legal">&copy; <span id="footerYear"></span> AppVault. All logos belong to respective owners. We do not host copyrighted content.</div></div></div></footer>

<script src="sheets-loader.js"></script>
<script src="main.js"></script>
<script>
async function loadSimilar() {
  var id = getParam("id");
  var catParam = getParam("cat");

  showLoading("similarApps");

  try {
    var apps, appName, appCategory;

    if (id) {
      var app = await window.AppVaultDB.getAppById(id);
      if (!app) { showError("similarApps", "App not found."); return; }
      appName = app.name;
      appCategory = app.category || "";
      apps = await window.AppVaultDB.getSimilarApps(id, 12);
    } else if (catParam) {
      appName = catParam;
      appCategory = catParam;
      apps = await window.AppVaultDB.getAppsByCategory(catParam);
    } else {
      showError("similarApps", "No app specified.");
      return;
    }

    // SEO
    document.getElementById("pageTitle").textContent = "Apps Like " + appName + " — Best Free Alternatives | AppVault";
    document.getElementById("pageDesc").setAttribute("content", "Looking for apps like " + appName + "? Find the best free alternatives in the " + appCategory + " category. Download APK free on AppVault.");

    document.getElementById("heroSection").innerHTML =
      '<h1 style="font-size:28px;margin-bottom:8px;">Apps Like <span style="color:var(--accent2);">' + appName + '</span></h1>'
      + '<p style="color:var(--text2);margin-bottom:8px;">The best free alternatives to ' + appName + ' — download APK and old versions free.</p>'
      + '<p style="font-size:13px;color:var(--text3);">Category: ' + (appCategory || "All") + '</p>';

    if (apps.length === 0) {
      showEmpty("similarApps", "No similar apps found yet. We are adding more apps regularly!");
    } else {
      document.getElementById("similarApps").innerHTML = apps.map(buildAppCard).join("");
    }

  } catch(e) {
    showError("similarApps");
  }
}

loadSimilar();
</script>
</body>
</html>
