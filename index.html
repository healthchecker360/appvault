<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AppVault — Download Free APK & Windows Software</title>

<link rel="stylesheet" href="style.css">

<style>

/* ───────── FEATURED HORIZONTAL ───────── */
.featured-scroll {
  overflow-x: auto;
  padding-bottom: 10px;
}
.featured-scroll::-webkit-scrollbar { display: none; }

.featured-row {
  display: flex;
  gap: 16px;
  width: max-content;
}
.featured-row .app-card {
  min-width: 240px;
}

/* ───────── CATEGORY COLUMNS ───────── */
.cat-scroll {
  overflow-x: auto;
  padding-bottom: 20px;
}
.cat-scroll::-webkit-scrollbar { display: none; }

.cat-row {
  display: flex;
  gap: 16px;
  width: max-content;
}

.cat-col {
  width: 250px;
  height: 380px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  display: flex;
  flex-direction: column;
}

.cat-head {
  padding: 12px;
  font-weight: 700;
  border-bottom: 1px solid var(--border);
  color: var(--accent2);
}

.cat-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.cat-app {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px;
  border-bottom: 1px solid var(--border2);
  text-decoration: none;
  color: inherit;
}

.cat-app:hover { background: var(--bg3); }

.cat-app img {
  width: 32px;
  height: 32px;
  border-radius: 8px;
}

.cat-name { font-size: 13px; font-weight: 600; }
.cat-meta { font-size: 10px; color: var(--text3); }

/* Mobile */
@media (max-width: 600px) {
  .cat-col { width: 45vw; }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-logo">
      <div class="logo-icon">A</div> App<span>Vault</span>
    </a>
  </div>
</nav>

<!-- HERO -->
<div class="container">
  <h1>Download APK & Software Free</h1>
</div>

<!-- FEATURED -->
<div class="container">
  <h2>⭐ Featured Apps</h2>

  <div class="featured-scroll">
    <div id="featuredApps" class="featured-row"></div>
  </div>
</div>

<!-- CATEGORY COLUMNS -->
<div class="container">
  <h2>📂 Categories</h2>

  <div class="cat-scroll">
    <div class="cat-row">

      <div class="cat-col">
        <div class="cat-head">Social</div>
        <div id="colSocial" class="cat-list"></div>
      </div>

      <div class="cat-col">
        <div class="cat-head">Messaging</div>
        <div id="colMessaging" class="cat-list"></div>
      </div>

      <div class="cat-col">
        <div class="cat-head">Games</div>
        <div id="colGames" class="cat-list"></div>
      </div>

      <div class="cat-col">
        <div class="cat-head">Security</div>
        <div id="colSecurity" class="cat-list"></div>
      </div>

      <div class="cat-col">
        <div class="cat-head">Tools</div>
        <div id="colTools" class="cat-list"></div>
      </div>

      <div class="cat-col">
        <div class="cat-head">Productivity</div>
        <div id="colProductivity" class="cat-list"></div>
      </div>

    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="container">
    <p>© AppVault</p>
  </div>
</footer>

<script src="sheets-loader.js"></script>
<script src="main.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async function() {

  try {
    var all = await window.AppVaultDB.getApps();

    /* FEATURED */
    var featured = all.filter(a => a.featured === 'yes').slice(0, 10);
    document.getElementById("featuredApps").innerHTML =
      featured.map(buildAppCard).join("");

    /* CATEGORY UI */
    var buildCatApp = function(app) {
      return `
        <a href="app.html?id=${app.id}" class="cat-app">
          <img src="${app.icon || 'icon-default.png'}">
          <div>
            <div class="cat-name">${app.name}</div>
            <div class="cat-meta">${app.version || 'Latest'}</div>
          </div>
        </a>`;
    };

    var fill = function(id, cat) {
      var list = all.filter(a => a.category === cat).slice(0, 12);
      document.getElementById(id).innerHTML =
        list.length ? list.map(buildCatApp).join("") : "No apps";
    };

    fill("colSocial", "social");
    fill("colMessaging", "communication");
    fill("colGames", "games");
    fill("colSecurity", "security");
    fill("colTools", "tools");
    fill("colProductivity", "productivity");

  } catch(e) {
    console.error(e);
  }

});
</script>

</body>
</html>
