<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AppVault — Premium APK Store</title>
<link rel="stylesheet" href="style.css">

<style>

/* ───────── GLOBAL ───────── */
body {
  background: linear-gradient(180deg, #0c0b1f, #090816);
}

/* ───────── NAVBAR GLASS ───────── */
.navbar {
  backdrop-filter: blur(12px);
  background: rgba(20,20,40,0.6);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* ───────── FEATURED CAROUSEL ───────── */
.featured-scroll {
  overflow-x: auto;
  scroll-snap-type: x mandatory;
}
.featured-row {
  display: flex;
  gap: 18px;
}
.featured-row .app-card {
  min-width: 260px;
  scroll-snap-align: start;
  background: linear-gradient(145deg,#14122e,#0f0d22);
  border-radius: 18px;
  padding: 14px;
  transition: 0.3s;
}
.featured-row .app-card:hover {
  transform: translateY(-6px) scale(1.03);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* ───────── CATEGORY SCROLL ───────── */
.cat-scroll {
  overflow-x: auto;
  scroll-snap-type: x mandatory;
}
.cat-row {
  display: flex;
  gap: 18px;
}

/* Column */
.cat-col {
  width: 260px;
  height: 420px;
  scroll-snap-align: start;
  background: linear-gradient(145deg,#14122e,#0f0d22);
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.05);
  overflow: hidden;
  transition: 0.3s;
}
.cat-col:hover {
  transform: translateY(-5px);
}

/* Header */
.cat-head {
  padding: 14px;
  font-weight: 700;
  font-size: 14px;
  background: linear-gradient(90deg,#7c4dff,#00e5ff);
  -webkit-background-clip: text;
  color: transparent;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* Scroll inside */
.cat-list {
  overflow-y: auto;
  height: 100%;
  padding: 8px;
}

/* App Row */
.cat-app {
  display: flex;
  gap: 10px;
  padding: 8px;
  border-radius: 10px;
  transition: 0.2s;
}
.cat-app:hover {
  background: rgba(255,255,255,0.05);
  transform: translateX(4px);
}

.cat-app img {
  width: 36px;
  height: 36px;
  border-radius: 10px;
}

.cat-name {
  font-size: 13px;
  font-weight: 600;
}

.cat-meta {
  font-size: 10px;
  color: #aaa;
}

/* ───────── SCROLLBAR PREMIUM ───────── */
::-webkit-scrollbar {
  height: 6px;
  width: 6px;
}
::-webkit-scrollbar-thumb {
  background: linear-gradient(90deg,#7c4dff,#00e5ff);
  border-radius: 10px;
}

/* MOBILE */
@media(max-width:600px){
  .cat-col { width: 70vw; }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="container">
    <h2>AppVault</h2>
  </div>
</nav>

<!-- HERO -->
<div class="container">
  <h1>🚀 Discover Apps Like Never Before</h1>
</div>

<!-- FEATURED -->
<div class="container">
  <h2>⭐ Featured</h2>
  <div class="featured-scroll">
    <div id="featuredApps" class="featured-row"></div>
  </div>
</div>

<!-- CATEGORY -->
<div class="container">
  <h2>📂 Explore Categories</h2>

  <div class="cat-scroll">
    <div class="cat-row">

      <div class="cat-col">
        <div class="cat-head">Social</div>
        <div id="colSocial" class="cat-list"></div>
      </div>

      <div class="cat-col">
        <div class="cat-head">Messaging</div>
        <div id="colMessaging" class="cat-list"></div>
      </div>

      <div class="cat-col">
        <div class="cat-head">Games</div>
        <div id="colGames" class="cat-list"></div>
      </div>

      <div class="cat-col">
        <div class="cat-head">Security</div>
        <div id="colSecurity" class="cat-list"></div>
      </div>

      <div class="cat-col">
        <div class="cat-head">Tools</div>
        <div id="colTools" class="cat-list"></div>
      </div>

      <div class="cat-col">
        <div class="cat-head">Productivity</div>
        <div id="colProductivity" class="cat-list"></div>
      </div>

    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="container">
  <p>© AppVault Premium UI</p>
</footer>

<script src="sheets-loader.js"></script>
<script src="main.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async function() {

  const all = await window.AppVaultDB.getApps();

  /* FEATURED */
  document.getElementById("featuredApps").innerHTML =
    all.filter(a => a.featured === 'yes').slice(0,10).map(buildAppCard).join("");

  /* CATEGORY */
  const build = app => `
    <a href="app.html?id=${app.id}" class="cat-app">
      <img src="${app.icon}">
      <div>
        <div class="cat-name">${app.name}</div>
        <div class="cat-meta">${app.rating || "4.5"} ★</div>
      </div>
    </a>`;

  const fill = (id, cat) => {
    document.getElementById(id).innerHTML =
      all.filter(a => a.category === cat).slice(0,12).map(build).join("");
  };

  fill("colSocial","social");
  fill("colMessaging","communication");
  fill("colGames","games");
  fill("colSecurity","security");
  fill("colTools","tools");
  fill("colProductivity","productivity");

  /* AUTO SLIDE FEATURED */
  let scroll = document.querySelector(".featured-scroll");
  setInterval(() => {
    scroll.scrollBy({ left: 300, behavior: "smooth" });
  }, 3000);

});
</script>

</body>
</html>
