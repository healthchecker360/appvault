<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Search Apps | AppVault</title>
  <meta name="description" content="Search and download free Android APK and Windows software on AppVault.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-logo"><div class="logo-icon">A</div>App<span>Vault</span></a>
    <div class="navbar-search"><span class="search-icon">&#128269;</span><input type="text" id="navSearch" placeholder="Search apps..."></div>
    <nav class="navbar-nav"><a href="index.html">Home</a><a href="android.html">Android</a><a href="windows.html">Windows</a><a href="categories.html">Categories</a><a href="trending.html">Trending</a></nav>
    <button class="navbar-menu-btn" id="menuBtn">&#9776;</button>
  </div>
  <div class="navbar-mobile" id="mobileMenu"><a href="index.html">Home</a><a href="android.html">Android</a><a href="windows.html">Windows</a><a href="categories.html">Categories</a></div>
</nav>

<div class="container" style="padding-top:48px;padding-bottom:32px;text-align:center;">
  <h1 style="font-size:32px;margin-bottom:16px;">Search <span style="color:var(--accent2);">Apps</span></h1>
  <div class="search-bar-large" style="max-width:600px;margin:0 auto;">
    <input type="text" id="searchInput" placeholder="e.g. WhatsApp, VLC, old version..." style="flex:1;">
    <button class="btn btn-primary" onclick="doSearch()">Search</button>
  </div>
</div>

<div class="container"><div class="ad-slot ad-slot-leaderboard">Advertisement</div></div>

<div class="container" style="margin-bottom:48px;">
  <div id="searchStatus" style="color:var(--text3);font-size:14px;margin-bottom:16px;"></div>
  <div id="searchResults" class="app-grid"></div>
</div>

<footer class="footer"><div class="container"><div class="footer-bottom"><div class="footer-legal">&copy; <span id="footerYear"></span> AppVault. All logos belong to respective owners. We do not host copyrighted content.</div></div></div></footer>

<script src="sheets-loader.js"></script>
<script src="main.js"></script>
<script>
var searchInput = document.getElementById("searchInput");

async function doSearch() {
  var q = searchInput.value.trim();
  if (!q) return;
  window.history.replaceState({}, "", "search.html?q=" + encodeURIComponent(q));
  document.getElementById("pageTitle").textContent = "Search: " + q + " | AppVault";
  document.getElementById("searchStatus").textContent = "Searching...";
  showLoading("searchResults");
  try {
    var results = await window.AppVaultDB.searchApps(q);
    document.getElementById("searchStatus").textContent = results.length + " result" + (results.length !== 1 ? "s" : "") + " for \"" + q + "\"";
    if (results.length === 0) {
      showEmpty("searchResults", "No apps found for \"" + q + "\"");
    } else {
      document.getElementById("searchResults").innerHTML = results.map(buildAppCard).join("");
    }
  } catch(e) {
    showError("searchResults");
  }
}

searchInput.addEventListener("keydown", function(e) { if (e.key === "Enter") doSearch(); });

// Auto-search if query in URL
var q = getParam("q");
if (q) { searchInput.value = q; doSearch(); }
</script>
</body>
</html>
