<script src="sheets-loader.js"></script>
<script src="main.js"></script>
<script>
// Permission descriptions in plain English
var PERMISSION_MEANINGS = {
  "INTERNET": { icon: "&#127760;", name: "Internet Access", desc: "This app can connect to the internet to load content, sync data, or show ads." },
  "CAMERA": { icon: "&#128247;", name: "Camera", desc: "This app can take photos or record video using your device camera." },
  "READ_CONTACTS": { icon: "&#128101;", name: "Read Contacts", desc: "This app can read names and phone numbers saved in your contact list." },
  "WRITE_CONTACTS": { icon: "&#128101;", name: "Edit Contacts", desc: "This app can add or change contacts on your device." },
  "ACCESS_FINE_LOCATION": { icon: "&#128205;", name: "Precise Location (GPS)", desc: "This app can see your exact location using GPS. This drains battery faster." },
  "ACCESS_COARSE_LOCATION": { icon: "&#128205;", name: "Approximate Location", desc: "This app can see your general area using Wi-Fi or mobile network." },
  "READ_EXTERNAL_STORAGE": { icon: "&#128193;", name: "Read Files & Photos", desc: "This app can read files, photos, and documents saved on your device." },
  "WRITE_EXTERNAL_STORAGE": { icon: "&#128190;", name: "Save Files", desc: "This app can save files and photos to your device storage." },
  "RECORD_AUDIO": { icon: "&#127908;", name: "Microphone", desc: "This app can record sound using your microphone. Used for calls or voice search." },
  "SEND_SMS": { icon: "&#128172;", name: "Send SMS", desc: "This app can send text messages. This may cost money on some plans." },
  "READ_SMS": { icon: "&#128172;", name: "Read SMS", desc: "This app can read your text messages." },
  "CALL_PHONE": { icon: "&#128222;", name: "Make Phone Calls", desc: "This app can make phone calls directly without you dialing." },
  "READ_PHONE_STATE": { icon: "&#128222;", name: "Device Info", desc: "This app can read your phone number and device ID." },
  "BLUETOOTH": { icon: "&#128268;", name: "Bluetooth", desc: "This app can connect to nearby Bluetooth devices like headphones or speakers." },
  "VIBRATE": { icon: "&#128267;", name: "Vibrate", desc: "This app can make your phone vibrate for notifications." },
  "RECEIVE_BOOT_COMPLETED": { icon: "&#128260;", name: "Start on Boot", desc: "This app starts automatically when you turn on your phone." },
  "WAKE_LOCK": { icon: "&#128336;", name: "Prevent Sleep", desc: "This app can keep your screen or processor awake in the background." },
  "BILLING": { icon: "&#128176;", name: "In-App Purchases", desc: "This app can offer paid items or subscriptions inside the app." },
  "NOTIFICATIONS": { icon: "&#128276;", name: "Notifications", desc: "This app can send you notification messages on your screen." }
};

function getPermissionInfo(perm) {
  var key = perm.replace("android.permission.", "").toUpperCase();
  return PERMISSION_MEANINGS[key] || { icon: "&#128274;", name: perm.replace("android.permission.", ""), desc: "This permission allows the app to access a feature on your device." };
}

async function loadAppPage() {
  var id = getParam("id");
  if (!id) { document.getElementById("appHeader").innerHTML = '<div class="error-state"><p>No app ID provided. <a href="index.html">Go home</a></p></div>'; return; }

  try {
    var app = await window.AppVaultDB.getAppById(id);
    if (!app) { document.getElementById("appHeader").innerHTML = '<div class="error-state"><p>App not found. <a href="index.html">Go home</a></p></div>'; return; }

    var platform = (app.platform || "android").toLowerCase();
    var isAndroid = platform === "android";

    // SEO title and description
    document.getElementById("pageTitle").textContent = "Download " + app.name + " APK Latest + Old Versions Free | AppVault";
    document.getElementById("pageDesc").setAttribute("content", "Download " + app.name + " APK free. Latest version and all old versions. No registration. Direct download links.");

    // --- APP HEADER ---
    var iconHTML = getAppIconHTML(app, 'app-page-icon', 'app-page-icon-fallback');

    var platformBadge = isAndroid
      ? '<span class="badge badge-android">Android APK</span>'
      : '<span class="badge badge-windows">Windows</span>';

    var shareText = encodeURIComponent("Download " + app.name + " APK free on AppVault! " + window.location.href);
    var whatsappURL = "https://wa.me/?text=" + shareText;
    var versions = await window.AppVaultDB.getVersionsForApp(id);

    document.getElementById("appHeader").innerHTML =
      '<div class="app-page-header">'
      + iconHTML
      + '<div>'
      + '<h1 class="app-page-title">' + app.name + '</h1>'
      + '<div class="app-page-developer">by ' + (app.developer || "Unknown Developer") + '</div>'
      + '<div class="app-page-meta">'
      + '<div class="app-page-stat"><strong>' + (app.rating || "N/A") + ' &#9733;</strong><span>Rating</span></div>'
      + '<div class="app-page-stat"><strong>' + (app.downloads || "N/A") + '</strong><span>Downloads</span></div>'
      + '<div class="app-page-stat"><strong>' + (app.license || "Free") + '</strong><span>License</span></div>'
      + platformBadge
      + '<span class="badge badge-free">Free</span>'
      + '</div>'
      + '<div class="app-page-actions">'
      + (versions.length > 0 && versions[0].download_url
          ? '<a href="' + versions[0].download_url + '" target="_blank" class="btn btn-success btn-lg">&#8681; Free Download</a>'
          : '<a href="#versions" class="btn btn-primary btn-lg">&#8595; View Versions</a>')
      + '<a href="' + whatsappURL + '" target="_blank" class="btn btn-whatsapp">&#128172; Share</a>'
      + '<a href="apps-like.html?id=' + app.id + '" class="btn btn-secondary">Similar Apps</a>'
      + '</div>'
      + '</div></div>';

    // --- DESCRIPTION ---
    document.getElementById("appDesc").innerHTML =
      '<div class="info-card">'
      + '<h2 style="font-size:18px;margin-bottom:12px;">About ' + app.name + '</h2>'
      + '<p style="color:var(--text2);line-height:1.8;">' + (app.description || "No description available.") + '</p>'
      + (app.features ? '<h3 style="font-size:15px;margin:16px 0 8px;">Key Features</h3><ul style="display:flex;flex-direction:column;gap:6px;">' + app.features.split("|").map(function(f){ return '<li style="color:var(--text2);font-size:14px;padding-left:16px;position:relative;"><span style="position:absolute;left:0;color:var(--accent2);">&#10003;</span>' + f.trim() + '</li>'; }).join("") + '</ul>' : '')
      + '</div>';

    // --- VERSIONS TABLE ---
    versions = versions || await window.AppVaultDB.getVersionsForApp(id);
    if (versions.length > 0) {
      var tableRows = versions.map(function(v, i) {
        var dlBtn = v.download_url
          ? '<a href="' + v.download_url + '" target="_blank" class="btn btn-success btn-sm">&#8595; Free Download</a>'
          : '<span style="color:var(--text3);font-size:13px;">Coming soon</span>';
        var mirrorBtn = v.mirror_url
          ? '<a href="' + v.mirror_url + '" target="_blank" class="btn btn-secondary btn-sm">&#9889; Fast Mirror</a>'
          : '';
        return '<tr>'
          + '<td><span class="version-tag">' + v.version + '</span>' + (i===0?'<span class="version-latest" style="margin-left:8px;">&#10003; Latest</span>':'') + '</td>'
          + '<td style="color:var(--text2);font-size:13px;">' + (v.label || '') + '</td>'
          + '<td style="color:var(--text3);font-size:13px;">' + (v.release_date || '—') + '</td>'
          + '<td style="color:var(--text3);font-size:13px;">' + (v.file_size || '—') + '</td>'
          + '<td style="color:var(--text3);font-size:13px;">' + (isAndroid ? (v.min_android || '—') : (v.min_windows || '—')) + '</td>'
          + '<td><div style="display:flex;gap:6px;flex-wrap:wrap;">' + dlBtn + mirrorBtn + '</div></td>'
          + '</tr>';
      }).join("");

      document.getElementById("versionsSection").innerHTML =
        '<div id="versions" class="info-card">'
        + '<div class="info-card-title"><div class="icon">&#128230;</div>All Versions</div>'
        + '<div class="download-section" style="margin:0 0 16px;">'
        + '<div class="download-section-title">Latest Version: ' + (versions[0].version || "") + '</div>'
        + '<div class="download-section-sub">Released ' + (versions[0].release_date || "N/A") + ' &bull; ' + (versions[0].file_size || "") + '</div>'
        + '<div class="download-btns">'
        + (versions[0].download_url ? '<a href="' + versions[0].download_url + '" target="_blank" class="btn btn-success btn-lg">&#8681; Free Download (TeraBox)</a>' : '')
        + (versions[0].mirror_url ? '<a href="' + versions[0].mirror_url + '" target="_blank" class="btn btn-secondary btn-lg">&#9889; Fast Mirror (Mega)</a>' : '')
        + '</div>'
        + '<div class="vpn-banner"><div class="vpn-icon">&#128737;</div><div><strong>Downloading from outside Pakistan/India?</strong>Use a VPN for faster speeds and unrestricted access.</div><a href="#" onclick="showToast(\'VPN affiliate link — add yours here!\')">Get VPN Free</a></div>'
        + '<div class="whatsapp-share-row"><span>Found this useful? Share with friends:</span><a href="https://wa.me/?text=' + shareText + '" target="_blank" class="btn btn-whatsapp btn-sm">&#128172; Share on WhatsApp</a></div>'
        + '</div>'
        + '<div class="versions-table-wrap"><table class="versions-table"><thead><tr><th>Version</th><th>Label</th><th>Release Date</th><th>File Size</th><th>' + (isAndroid?"Min Android":"Min Windows") + '</th><th>Download</th></tr></thead><tbody>' + tableRows + '</tbody></table></div>'
        + '</div>';
    } else {
      document.getElementById("versionsSection").innerHTML = '<div class="info-card"><p style="color:var(--text3);">No versions added yet. Check back soon.</p></div>';
    }

    // --- ROLLBACK GUIDE ---
    if (app.rollback_guide) {
      var steps = app.rollback_guide.split("|").map(function(s){ return s.trim(); }).filter(Boolean);
      document.getElementById("rollbackSection").innerHTML =
        '<div class="info-card">'
        + '<div class="info-card-title"><div class="icon">&#8635;</div>How to Downgrade ' + app.name + '</div>'
        + '<p style="color:var(--text2);font-size:14px;margin-bottom:16px;">Follow these steps to install an older version of ' + app.name + ' on your device:</p>'
        + '<div class="rollback-steps">'
        + steps.map(function(step, i){ return '<div class="rollback-step"><div class="rollback-step-num">' + (i+1) + '</div><div class="rollback-step-text">' + step + '</div></div>'; }).join("")
        + '</div></div>';
    } else {
      document.getElementById("rollbackSection").innerHTML =
        '<div class="info-card">'
        + '<div class="info-card-title"><div class="icon">&#8635;</div>How to Downgrade ' + app.name + '</div>'
        + '<div class="rollback-steps">'
        + '<div class="rollback-step"><div class="rollback-step-num">1</div><div class="rollback-step-text">Go to Settings on your Android device, then tap on Apps or Application Manager.</div></div>'
        + '<div class="rollback-step"><div class="rollback-step-num">2</div><div class="rollback-step-text">Find ' + app.name + ' in the list and tap Uninstall to remove the current version.</div></div>'
        + '<div class="rollback-step"><div class="rollback-step-num">3</div><div class="rollback-step-text">Before installing the old version, go to Settings &rarr; Security and enable "Install from Unknown Sources" or "Allow from this source".</div></div>'
        + '<div class="rollback-step"><div class="rollback-step-num">4</div><div class="rollback-step-text">Download the old version APK you want from the versions table above.</div></div>'
        + '<div class="rollback-step"><div class="rollback-step-num">5</div><div class="rollback-step-text">Open the downloaded APK file from your notifications or file manager and tap Install.</div></div>'
        + '<div class="rollback-step"><div class="rollback-step-num">6</div><div class="rollback-step-text">Once installed, you may want to disable automatic updates in the Play Store so the app does not update itself automatically.</div></div>'
        + '</div></div>';
    }

    // --- PERMISSIONS ---
    if (app.permissions) {
      var perms = app.permissions.split("|").map(function(p){ return p.trim(); }).filter(Boolean);
      document.getElementById("permissionsSection").innerHTML =
        '<div class="info-card">'
        + '<div class="info-card-title"><div class="icon">&#128274;</div>Permissions Explained</div>'
        + '<p style="color:var(--text2);font-size:14px;margin-bottom:14px;">These are the permissions ' + app.name + ' asks for, explained in simple language:</p>'
        + '<div class="permissions-list">'
        + perms.map(function(p){
            var info = getPermissionInfo(p);
            return '<div class="permission-item"><div class="permission-icon">' + info.icon + '</div><div><div class="permission-name">' + info.name + '</div><div class="permission-desc">' + info.desc + '</div></div></div>';
          }).join("")
        + '</div></div>';
    }

    addRecentView(app);
    initReviewSection(app);
    window.AppVaultDB.getAlternativeApps(id, 4).then(function(alternatives) {
      if (alternatives.length > 0) {
        document.getElementById('alternativeSection').innerHTML =
          '<div class="info-card">'
          + '<div class="info-card-title"><div class="icon">&#8644;</div>Alternative Apps to ' + app.name + '</div>'
          + '<div class="app-grid">' + alternatives.map(buildAppCard).join('') + '</div>'
          + '</div>';
      }
    });

    // --- SIMILAR APPS ---
    var similar = await window.AppVaultDB.getSimilarApps(id, 4);
    if (similar.length > 0) {
      document.getElementById("similarSection").innerHTML =
        '<div style="margin:32px 0;">'
        + '<div class="section-header"><h2 class="section-title">Apps Like <span>' + app.name + '</span></h2><a href="apps-like.html?id=' + app.id + '" class="section-link">See all &rarr;</a></div>'
        + '<div class="app-grid">' + similar.map(buildAppCard).join("") + '</div>'
        + '</div>';
    }

  } catch(e) {
    console.error(e);
    document.getElementById("appHeader").innerHTML = '<div class="error-state"><p>Error loading app. Please refresh.</p></div>';
  }
}

loadAppPage();
</script>
</body>
</html>
