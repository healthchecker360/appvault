  <link rel="stylesheet" href="style.css">
  <style>
    /* Version row click highlight */
    .versions-table tbody tr { cursor: pointer; transition: background 0.15s; }
    .versions-table tbody tr.selected td { background: rgba(108,92,231,0.13) !important; }
    .versions-table tbody tr:hover td   { background: var(--bg3); }

    /* Selected version download panel */
    #selectedVersionPanel {
      display: none;
      background: linear-gradient(135deg, #13102a 0%, #0d0a1e 100%);
      border: 1px solid var(--accent);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      margin-bottom: 16px;
      animation: fadeIn .2s ease;
    }
    #selectedVersionPanel.visible { display: block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:none; } }
    .svp-label { font-size: 13px; color: var(--accent2); font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .06em; }
    .svp-version { font-family: var(--font-head); font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .svp-meta { font-size: 13px; color: var(--text3); margin-bottom: 16px; }
    .svp-btns { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .svp-close { float: right; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 18px; margin-top: -4px; }
    .svp-close:hover { color: #fff; }
    .version-click-hint { font-size: 12px; color: var(--text3); margin-bottom: 8px; font-style: italic; }

    /* Version comparison toggle */
    .compare-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .compare-toggle-btn {
      padding: 6px 14px;
      background: var(--bg4);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text2);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-body);
    }
    .compare-toggle-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .compare-toggle-btn.active { background: rgba(108,92,231,0.15); border-color: var(--accent); color: var(--accent2); }

    /* App page bookmark btn */
    .page-bookmark-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: var(--radius);
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text2);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-body);
    }
    .page-bookmark-btn:hover { border-color: #e84393; color: #e84393; background: rgba(232,67,147,0.08); }
    .page-bookmark-btn.bookmarked { color: #e84393; border-color: #e84393; background: rgba(232,67,147,0.1); }
  </style>
</head>

<script>

  "BLUETOOTH":              { icon: "&#128268;", name: "Bluetooth",              desc: "This app can connect to nearby Bluetooth devices like headphones or speakers." },
  "VIBRATE":                { icon: "&#128267;", name: "Vibrate",                desc: "This app can make your phone vibrate for notifications." },

function getPermissionInfo(perm) {
  var key = perm.replace("android.permission.", "").toUpperCase();
  return PERMISSION_MEANINGS[key] || { icon: "&#128274;", name: perm.replace("android.permission.", ""), desc: "This permission allows the app to access a feature on your device." };
}

// ---- Selected version panel ----
function showSelectedVersion(v, shareText, isAndroid) {
  var panel = document.getElementById("selectedVersionPanel");
  if (!panel) return;
  var dlBtn     = v.download_url ? '<a href="' + v.download_url + '" target="_blank" class="btn btn-success btn-lg">&#8681; Free Download</a>' : '';
  var mirrorBtn = v.mirror_url   ? '<a href="' + v.mirror_url   + '" target="_blank" class="btn btn-secondary btn-lg">&#9889; Fast Mirror</a>'   : '';
  var waBtn     = '<a href="https://wa.me/?text=' + shareText + '" target="_blank" class="btn btn-whatsapp btn-lg">&#128172; Share</a>';

  // Copy link button
  var copyUrl = v.download_url || v.mirror_url || "";
  var copyBtn = copyUrl
    ? '<button class="copy-link-btn" onclick="copyDownloadLink(\'' + copyUrl.replace(/'/g,"") + '\', this)" title="Copy download link">&#128279; Copy Link</button>'
    : '';

  if (!dlBtn && !mirrorBtn) {
    panel.classList.remove("visible");
    return;
  }
  var minLabel = isAndroid ? "Min Android" : "Min Windows";
  var minVal   = isAndroid ? (v.min_android || "—") : (v.min_windows || "—");
  panel.innerHTML =
    '<button class="svp-close" onclick="document.getElementById(\'selectedVersionPanel\').classList.remove(\'visible\');document.querySelectorAll(\'.versions-table tbody tr\').forEach(function(r){r.classList.remove(\'selected\');});">&#x2715;</button>'
    + '<div class="svp-label">&#128230; Selected Version</div>'
    + '<div class="svp-version">' + v.version + (v.label ? ' <span style="font-size:14px;color:var(--text3);font-weight:400;">— ' + v.label + '</span>' : '') + '</div>'
    + '<div class="svp-meta">'
    + (v.release_date ? '&#128197; ' + v.release_date + '&nbsp;&nbsp;' : '')
    + (v.file_size    ? '&#128190; ' + v.file_size    + '&nbsp;&nbsp;' : '')
    + minLabel + ': ' + minVal
    + '</div>'
    + '<div class="svp-btns">' + dlBtn + mirrorBtn + waBtn + copyBtn + '</div>'
    + (v.changelog ? '<div style="margin-top:12px;font-size:13px;color:var(--text2);border-top:1px solid var(--border);padding-top:10px;"><strong style="color:var(--text);">Changelog:</strong> ' + v.changelog + '</div>' : '');
  panel.classList.add("visible");
  panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

// Copy download link
function copyDownloadLink(url, btn) {
  copyToClipboard(url, "Download link copied!");
  if (btn) {
    btn.classList.add("copied");
    btn.innerHTML = "&#10003; Copied!";
    setTimeout(function() {
      btn.classList.remove("copied");
      btn.innerHTML = "&#128279; Copy Link";
    }, 2000);
  }
}

// Version comparison table toggle
var _showCompare = false;
function toggleVersionCompare() {
  _showCompare = !_showCompare;
  var btn = document.getElementById("compareToggleBtn");
  var compareWrap = document.getElementById("versionCompareWrap");
  if (btn) btn.classList.toggle("active", _showCompare);
  if (compareWrap) compareWrap.style.display = _showCompare ? "" : "none";
  if (btn) btn.textContent = _showCompare ? "&#9660; Hide Comparison" : "&#9654; Version Comparison";
}

function buildVersionCompareTable(versions, isAndroid) {
  if (!versions || versions.length < 2) return "";
  var minLabel = isAndroid ? "Min Android" : "Min Windows";
  var rows = versions.map(function(v, i) {
    var isLatest = i === 0;
    var dlUrl = v.download_url || v.mirror_url || "";
    var dlBtn = dlUrl
      ? '<a href="' + dlUrl + '" target="_blank" class="vc-dl-btn' + (isLatest ? ' primary' : '') + '">&#8681; ' + (isLatest ? "Download" : "Get") + '</a>'
      : '<span style="color:var(--text3);font-size:11px;">No link</span>';
    var copyBtn = dlUrl
      ? ' <button class="copy-link-btn" style="margin-left:4px;" onclick="copyDownloadLink(\'' + dlUrl.replace(/'/g,"") + '\', this)" title="Copy link">&#128279;</button>'
      : '';
    return '<tr' + (isLatest ? ' class="vc-latest"' : '') + '>'
      + '<td><span class="vc-version">' + v.version + '</span>' + (isLatest ? ' <span style="font-size:10px;font-weight:600;color:var(--success);margin-left:4px;">LATEST</span>' : '') + '</td>'
      + '<td><span class="vc-date">' + (v.release_date || "—") + '</span></td>'
      + '<td><span class="vc-size">' + (v.file_size || "—") + '</span></td>'
      + '<td style="color:var(--text3);font-size:11px;">' + (isAndroid ? (v.min_android || "—") : (v.min_windows || "—")) + '</td>'
      + '<td class="vc-change">' + (v.changelog || v.label || "—") + '</td>'
      + '<td style="white-space:nowrap;">' + dlBtn + copyBtn + '</td>'
      + '</tr>';
  }).join("");

  return '<div id="versionCompareWrap" style="display:none;" class="version-compare-wrap">'
    + '<table class="version-compare-table">'
    + '<thead><tr>'
    + '<th>Version</th><th>Release Date</th><th>Size</th><th>' + minLabel + '</th><th>Changes</th><th>Download</th>'
    + '</tr></thead>'
    + '<tbody>' + rows + '</tbody>'
    + '</table>'
    + '</div>';
}

async function loadAppPage() {
  var id = getParam("id");
  if (!id) {
    document.getElementById("appHeader").innerHTML = '<div class="error-state"><p>No app ID provided. <a href="index.html">Go home</a></p></div>';
    return;
  }

  // Track recently viewed
  RecentlyViewed.add(id);

  try {
    var app = await window.AppVaultDB.getAppById(id);
    if (!app) {
      document.getElementById("appHeader").innerHTML = '<div class="error-state"><p>App not found. <a href="index.html">Go home</a></p></div>';
      return;
    }

    var platform  = (app.platform || "android").toLowerCase();
    var isAndroid = platform === "android";
    var isBookmarked = Bookmarks.has(app.id);

    document.getElementById("pageTitle").textContent  = "Download " + app.name + " APK Latest + Old Versions Free | AppVault";
    document.getElementById("pageDesc").setAttribute("content", "Download " + app.name + " APK free. Latest version and all old versions. No registration. Direct download links.");

    var iconHTML   = getAppIconHTML(app, 'app-page-icon', 'app-page-icon-fallback');
    var shareText  = encodeURIComponent("Download " + app.name + " APK free on AppVault! " + window.location.href);
    var whatsappURL = "https://wa.me/?text=" + shareText;
    var versions   = await window.AppVaultDB.getVersionsForApp(id);

    var platformBadge = isAndroid
      ? '<span class="badge badge-android">Android APK</span>'
      : '<span class="badge badge-windows">Windows</span>';

    var latestWithLink = versions.find(function(v) { return v.download_url; });
    var primaryBtn = latestWithLink
      ? '<a href="' + latestWithLink.download_url + '" target="_blank" class="btn btn-success btn-lg">&#8681; Free Download</a>'
      : (versions.length > 0
          ? '<a href="#versions" class="btn btn-primary btn-lg">&#8595; View Versions</a>'
          : '<span style="color:var(--text3);font-size:14px;">No download available yet</span>');

    // Copy page link button
    var copyPageBtn = '<button class="btn btn-secondary" onclick="copyToClipboard(window.location.href,\'Page link copied!\')">&#128279; Copy Link</button>';

    // Bookmark button
    var bookmarkBtn = '<button id="pageBookmarkBtn" class="page-bookmark-btn' + (isBookmarked ? ' bookmarked' : '') + '" '
      + 'onclick="togglePageBookmark(\'' + (app.id||"").replace(/'/g,"") + '\',\'' + (app.name||"").replace(/'/g,"") + '\')">'
      + (isBookmarked ? '&#10084;&#65039; Saved' : '&#9825; Save') + '</button>';

    // Latest version badge in header
    var latestV = versions[0];
    var versionInfo = latestV
      ? '<div class="app-page-stat"><strong>' + latestV.version + '</strong><span>Latest Version</span></div>'
      : '';

    document.getElementById("appHeader").innerHTML =
      '<div class="app-page-header">'
      + iconHTML
      + '<div>'
      + '<h1 class="app-page-title">' + app.name + '</h1>'
      + '<div class="app-page-developer">by ' + (app.developer || "Unknown Developer") + '</div>'
      + '<div class="app-page-meta">'
      + '<div class="app-page-stat"><strong>' + (app.rating || "N/A") + ' &#9733;</strong><span>Rating</span></div>'
      + '<div class="app-page-stat"><strong>' + (app.downloads || "N/A") + '</strong><span>Downloads</span></div>'
      + '<div class="app-page-stat"><strong>' + (app.license || "Free") + '</strong><span>License</span></div>'
      + versionInfo
      + platformBadge
      + '<span class="badge badge-free">Free</span>'
      + '</div>'
      + '<div class="app-page-actions">'
      + primaryBtn
      + '<a href="' + whatsappURL + '" target="_blank" class="btn btn-whatsapp">&#128172; Share</a>'
      + copyPageBtn
      + bookmarkBtn
      + '<a href="apps-like.html?id=' + app.id + '" class="btn btn-secondary">Similar Apps</a>'
      + '</div>'
      + '</div></div>';

    // --- DESCRIPTION ---
    document.getElementById("appDesc").innerHTML =
      '<div class="info-card">'
      + '<h2 style="font-size:18px;margin-bottom:12px;">About ' + app.name + '</h2>'
      + '<p style="color:var(--text2);line-height:1.8;">' + (app.description || "No description available.") + '</p>'
      + (app.features ? '<h3 style="font-size:15px;margin:16px 0 8px;">Key Features</h3><ul style="display:flex;flex-direction:column;gap:6px;">'
          + app.features.replace(/;/g,'|').split("|").map(function(f) {
              return '<li style="color:var(--text2);font-size:14px;padding-left:16px;position:relative;"><span style="position:absolute;left:0;color:var(--accent2);">&#10003;</span>' + f.trim() + '</li>';
            }).join("") + '</ul>' : '')
      + '</div>';

    // --- VERSIONS TABLE ---
    if (versions.length > 0) {
      var tableRows = versions.map(function(v, i) {
        var hasDl     = v.download_url && v.download_url.trim() !== "";
        var hasMirror = v.mirror_url   && v.mirror_url.trim() !== "";
        var actionText = (hasDl || hasMirror) ? '&#128077; Click to select' : '<span style="color:var(--text3);font-size:12px;">No link yet</span>';
        return '<tr data-idx="' + i + '" onclick="selectVersionRow(this,' + i + ')">'
          + '<td><span class="version-tag">' + v.version + '</span>'
          + (i === 0 ? '<span class="version-latest" style="margin-left:8px;">&#10003; Latest</span>' : '') + '</td>'
          + '<td style="color:var(--text2);font-size:13px;">' + (v.label || '') + '</td>'
          + '<td style="color:var(--text3);font-size:13px;">' + (v.release_date || '—') + '</td>'
          + '<td style="color:var(--text3);font-size:13px;">' + (v.file_size || '—') + '</td>'
          + '<td style="color:var(--text3);font-size:13px;">' + (isAndroid ? (v.min_android || '—') : (v.min_windows || '—')) + '</td>'
          + '<td style="font-size:13px;">' + actionText + '</td>'
          + '</tr>';
      }).join("");

      var compareTableHTML = buildVersionCompareTable(versions, isAndroid);

      document.getElementById("versionsSection").innerHTML =
        '<div id="versions" class="info-card">'
        + '<div class="info-card-title"><div class="icon">&#128230;</div>All Versions</div>'

        // Latest version quick-download block
        + '<div class="download-section" style="margin:0 0 16px;">'
        + '<div class="download-section-title">Latest Version: ' + (latestV.version || "") + '</div>'
        + '<div class="download-section-sub">Released ' + (latestV.release_date || "N/A") + ' &bull; ' + (latestV.file_size || "") + '</div>'
        + '<div class="download-btns">'
        + (latestV.download_url ? '<a href="' + latestV.download_url + '" target="_blank" class="btn btn-success btn-lg">&#8681; Free Download (TeraBox)</a>' : '')
        + (latestV.mirror_url   ? '<a href="' + latestV.mirror_url   + '" target="_blank" class="btn btn-secondary btn-lg">&#9889; Fast Mirror (Mega)</a>'   : '')
        + (latestV.download_url ? '<button class="copy-link-btn" onclick="copyDownloadLink(\'' + (latestV.download_url||"").replace(/'/g,"") + '\', this)">&#128279; Copy Link</button>' : '')
        + '</div>'
        + '<div class="vpn-banner"><div class="vpn-icon">&#128737;</div><div><strong>Downloading from outside Pakistan/India?</strong>Use a VPN for faster speeds and unrestricted access.</div><a href="#" onclick="showToast(\'VPN affiliate link — add yours here!\')">Get VPN Free</a></div>'
        + '<div class="whatsapp-share-row"><span>Found this useful? Share with friends:</span><a href="https://wa.me/?text=' + shareText + '" target="_blank" class="btn btn-whatsapp btn-sm">&#128172; Share on WhatsApp</a></div>'
        + '</div>'

        // Selected version panel
        + '<div id="selectedVersionPanel"></div>'

        // Version comparison table toggle
        + (versions.length >= 2 ?
          '<div class="compare-toggle-row">'
          + '<p class="version-click-hint">&#128161; Click any row to see its download buttons</p>'
          + '<button class="compare-toggle-btn" id="compareToggleBtn" onclick="toggleVersionCompare()">&#9654; Version Comparison</button>'
          + '</div>'
          + compareTableHTML
          : '<p class="version-click-hint">&#128161; Click any row below to see its download buttons</p>')

        // Versions list table
        + '<div class="versions-table-wrap"><table class="versions-table"><thead><tr><th>Version</th><th>Label</th><th>Release Date</th><th>File Size</th><th>' + (isAndroid ? "Min Android" : "Min Windows") + '</th><th>Action</th></tr></thead><tbody>' + tableRows + '</tbody></table></div>'
        + '</div>';

      window._appVersions   = versions;
      window._appShareText  = shareText;
      window._appIsAndroid  = isAndroid;

    } else {
      document.getElementById("versionsSection").innerHTML =
        '<div class="info-card"><p style="color:var(--text3);">No versions added yet. Check back soon.</p></div>';
    }

    // --- ROLLBACK GUIDE ---
    if (app.rollback_guide) {
      var steps = app.rollback_guide.replace(/;/g,'|').split("|").map(function(s){ return s.trim(); }).filter(Boolean);
      document.getElementById("rollbackSection").innerHTML =
        '<div class="info-card">'
        + '<div class="info-card-title"><div class="icon">&#8635;</div>How to Downgrade ' + app.name + '</div>'
        + '<p style="color:var(--text2);font-size:14px;margin-bottom:16px;">Follow these steps to install an older version:</p>'
        + '<div class="rollback-steps">'
        + steps.map(function(step, i){ return '<div class="rollback-step"><div class="rollback-step-num">' + (i+1) + '</div><div class="rollback-step-text">' + step + '</div></div>'; }).join("")
        + '</div></div>';
    } else {
      document.getElementById("rollbackSection").innerHTML =
        '<div class="info-card">'
        + '<div class="info-card-title"><div class="icon">&#8635;</div>How to Downgrade ' + app.name + '</div>'
        + '<div class="rollback-steps">'
        + '<div class="rollback-step"><div class="rollback-step-num">1</div><div class="rollback-step-text">Go to Settings on your Android device, then tap on Apps or Application Manager.</div></div>'
        + '<div class="rollback-step"><div class="rollback-step-num">2</div><div class="rollback-step-text">Find ' + app.name + ' in the list and tap Uninstall to remove the current version.</div></div>'
        + '<div class="rollback-step"><div class="rollback-step-num">3</div><div class="rollback-step-text">Before installing the old version, go to Settings &rarr; Security and enable "Install from Unknown Sources".</div></div>'
        + '<div class="rollback-step"><div class="rollback-step-num">4</div><div class="rollback-step-text">Download the old version APK you want from the versions table above.</div></div>'
        + '<div class="rollback-step"><div class="rollback-step-num">5</div><div class="rollback-step-text">Open the downloaded APK file from your notifications or file manager and tap Install.</div></div>'
        + '<div class="rollback-step"><div class="rollback-step-num">6</div><div class="rollback-step-text">Once installed, disable automatic updates in the Play Store so the app does not update itself.</div></div>'
        + '</div></div>';
    }

    // --- PERMISSIONS ---
    if (app.permissions) {
      var perms = app.permissions.replace(/;/g,'|').split("|").map(function(p){ return p.trim(); }).filter(Boolean);
      document.getElementById("permissionsSection").innerHTML =
        '<div class="info-card">'
        + '<div class="info-card-title"><div class="icon">&#128274;</div>Permissions Explained</div>'
        + '<p style="color:var(--text2);font-size:14px;margin-bottom:14px;">These are the permissions ' + app.name + ' asks for, explained in simple language:</p>'
        + '<div class="permissions-list">'
        + perms.map(function(p) {
            var info = getPermissionInfo(p);
            return '<div class="permission-item"><div class="permission-icon">' + info.icon + '</div><div><div class="permission-name">' + info.name + '</div><div class="permission-desc">' + info.desc + '</div></div></div>';
          }).join("")
        + '</div></div>';
    }

    // --- SIMILAR APPS ---
    var similar = await window.AppVaultDB.getSimilarApps(id, 4);
    if (similar.length > 0) {
      document.getElementById("similarSection").innerHTML =
        '<div style="margin:32px 0;">'
        + '<div class="section-header"><h2 class="section-title">Apps Like <span>' + app.name + '</span></h2><a href="apps-like.html?id=' + app.id + '" class="section-link">See all &rarr;</a></div>'
        + '<div class="app-grid">' + similar.map(buildAppCard).join("") + '</div>'
        + '</div>';
    }

  } catch(e) {
    console.error(e);
    document.getElementById("appHeader").innerHTML = '<div class="error-state"><p>Error loading app. Please refresh the page.</p></div>';
  }
}

function selectVersionRow(row, idx) {
  document.querySelectorAll(".versions-table tbody tr").forEach(function(r) {
    r.classList.remove("selected");
  });
  row.classList.add("selected");
  var v = window._appVersions && window._appVersions[idx];
  if (v) {
    showSelectedVersion(v, window._appShareText, window._appIsAndroid);
  }
}

// Page-level bookmark button
function togglePageBookmark(appId, appName) {
  var added = Bookmarks.toggle(appId);
  var btn = document.getElementById("pageBookmarkBtn");
  if (btn) {
    btn.innerHTML = added ? "&#10084;&#65039; Saved" : "&#9825; Save";
    btn.classList.toggle("bookmarked", added);
  }
  showToast(added ? (appName || "App") + " saved to Wishlist ❤" : "Removed from Wishlist", added ? "success" : "info");
  var badge = document.getElementById("bookmarkCount");
  if (badge) {
    var c = Bookmarks.count();
    badge.textContent = c > 0 ? c : "";
    badge.style.display = c > 0 ? "" : "none";
  }
}

// Load page with schema injection
async function loadAndInjectSchema() {
  var id = getParam("id");
  if (!id) { await loadAppPage(); return; }
  try {
    var app = await window.AppVaultDB.getAppById(id);
    if (!app) { showRemovedApp(id); return; }
    var versions = await window.AppVaultDB.getVersionsForApp(id);
    injectAppSchema(app, versions);
  } catch(e) {}
  await loadAppPage();
}

loadAndInjectSchema();
</script>
</body>
</html>
