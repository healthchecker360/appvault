<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AppVault — Premium APK & Software Hub</title>

<link rel="stylesheet" href="style.css">

<style>

/* ================= PREMIUM FEATURED SLIDER ================= */
.featured-scroll {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  padding-bottom: 10px;
}
.featured-scroll::-webkit-scrollbar { display: none; }
.featured-scroll .app-card {
  min-width: 260px;
}

/* ================= CATEGORY COLUMN SYSTEM ================= */
.category-wrapper {
  overflow-x: auto;
  padding-bottom: 10px;
}
.category-wrapper::-webkit-scrollbar { display: none; }

.category-flex {
  display: flex;
  gap: 16px;
  width: max-content;
}

.category-col {
  width: 260px;
  height: 380px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: 0.25s;
}

.category-col:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
}

.category-header {
  padding: 12px;
  border-bottom: 1px solid var(--border);
  font-weight: 700;
  color: var(--accent2);
  display: flex;
  justify-content: space-between;
}

.category-list {
  flex: 1;
  overflow-y: auto;
}

/* mini app row */
.mini-app {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  border-bottom: 1px solid var(--border2);
  transition: 0.2s;
}
.mini-app:hover {
  background: var(--bg3);
  transform: translateX(4px);
}

.mini-app img {
  width: 36px;
  height: 36px;
  border-radius: 8px;
}

.mini-info {
  flex: 1;
}

.mini-name {
  font-size: 13px;
  font-weight: 600;
}

.mini-meta {
  font-size: 11px;
  color: var(--text3);
}

/* MOBILE FIX */
@media(max-width:600px){
  .category-col{
    width: 40vw;
    min-width: 140px;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="#" class="navbar-logo">App<span>Vault</span></a>

    <div class="navbar-search">
      <input type="text" id="navSearch" placeholder="Search apps...">
    </div>

    <div class="navbar-nav">
      <a href="#">Home</a>
      <a href="#">Android</a>
      <a href="#">Windows</a>
      <a href="#">Categories</a>
      <a href="#" class="btn btn-primary">Request</a>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="container">
    <h1>Download APK & Software</h1>
    <p>All versions • Safe • Fast • No login required</p>
  </div>
</section>

<!-- ================= FEATURED (NOW PREMIUM HORIZONTAL) ================= -->
<section class="container">
  <div class="section-header">
    <h2 class="section-title">⭐ Featured Apps</h2>
  </div>

  <div id="featuredApps" class="featured-scroll"></div>
</section>

<!-- ================= CATEGORY (NEW COLUMN SYSTEM) ================= -->
<section class="container">
  <div class="section-header">
    <h2 class="section-title">📂 Categories</h2>
  </div>

  <div class="category-wrapper">
    <div class="category-flex">

      <div class="category-col">
        <div class="category-header">Entertainment</div>
        <div id="catEntertainment" class="category-list"></div>
      </div>

      <div class="category-col">
        <div class="category-header">Games</div>
        <div id="catGames" class="category-list"></div>
      </div>

      <div class="category-col">
        <div class="category-header">Social</div>
        <div id="catSocial" class="category-list"></div>
      </div>

      <div class="category-col">
        <div class="category-header">Messaging</div>
        <div id="catMessaging" class="category-list"></div>
      </div>

      <div class="category-col">
        <div class="category-header">Security</div>
        <div id="catSecurity" class="category-list"></div>
      </div>

      <div class="category-col">
        <div class="category-header">Photography</div>
        <div id="catPhotography" class="category-list"></div>
      </div>

    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="container">
    <div class="footer-legal">© AppVault</div>
  </div>
</footer>

<!-- SCRIPTS -->
<script src="sheets-loader.js"></script>
<script src="main.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const all = await window.AppVaultDB.getApps();

  // ===== MINI ROW =====
  function mini(app){
    return `
      <a href="app.html?id=${app.id}" class="mini-app">
        <img src="${app.icon}">
        <div class="mini-info">
          <div class="mini-name">${app.name}</div>
          <div class="mini-meta">${app.downloads || '100K+'}</div>
        </div>
      </a>
    `;
  }

  function fill(id, cat){
    const el = document.getElementById(id);
    const apps = all.filter(a => a.category?.toLowerCase() === cat).slice(0,10);
    el.innerHTML = apps.map(mini).join('');
  }

  fill("catEntertainment","entertainment");
  fill("catGames","games");
  fill("catSocial","social");
  fill("catMessaging","communication");
  fill("catSecurity","security");
  fill("catPhotography","photography");

  // ===== FEATURED =====
  document.getElementById("featuredApps").innerHTML =
    all.filter(a => a.featured === "yes")
       .slice(0,8)
       .map(buildAppCard)
       .join("");

});
</script>

</body>
</html>
